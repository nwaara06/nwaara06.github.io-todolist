<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Premium To-Do</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <div class="time-widget">
            <h1 id="clock">00:00:00</h1>
            <p id="date"><i class="fa-regular fa-calendar-days"></i> Memuat...</p>
        </div>

        <div class="todo-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-star"></i> Prioritas</h2>
                <span id="task-counter">0 Tugas</span>
            </div>
            
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="Tulis rencana hari ini...">
                <button id="add-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

            <ul id="todo-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
